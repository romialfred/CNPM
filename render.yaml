# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploiement DEMONSTRATION : la plateforme (front Angular) est publiee en SITE STATIQUE,
# en mode 'demo'. Tous les ecrans fonctionnent sur fixtures, sans backend ni base : c'est
# gratuit, fiable et immediatement accessible a un nom de domaine.
#
# Pour la version avec backend reel (PostgreSQL + API Spring Boot, mode http), voir
# deploy/render/render.full-stack.yaml et deploy/render/README.md.

services:
  - type: web
    name: cnpm-web
    runtime: static
    # Build de prod, puis ecriture du runtime-config en mode 'demo'.
    buildCommand: cd web && npm ci && npm run build && node ../deploy/render/make-runtime-config.mjs dist/cnpm-web/browser/runtime-config.js
    staticPublishPath: web/dist/cnpm-web/browser
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: CNPM_DATA_MODE
        value: demo
    # SPA : toute route inconnue est servie par index.html (routage cote client Angular).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
