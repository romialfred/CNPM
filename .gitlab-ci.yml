stages:
  - validate
  - test
  - security
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

validate-repository:
  stage: validate
  image: python:3.13-slim
  before_script:
    - pip install --no-cache-dir pyyaml pillow
  script:
    - bash scripts/validate-pack.sh
    - python -m unittest discover -s docs/ui-handoff/scripts -p "test_*.py"

backend-test:
  stage: test
  image: maven:3.9-eclipse-temurin-25
  # Les tests d'intégration créent leurs propres conteneurs PostgreSQL via
  # Testcontainers ; ils ont besoin d'un démon Docker, pas d'un service PostgreSQL
  # en sidecar. Un simple service `postgres:18.4` ne fournit pas de démon Docker :
  # la suite échouerait avec « Could not find a valid Docker environment ».
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Testcontainers dialogue avec l'API Docker exposée par le service dind.
    TESTCONTAINERS_HOST_OVERRIDE: docker
  script:
    - mvn -f backend/pom.xml -B clean verify
  rules:
    - exists:
        - backend/pom.xml

web-test:
  stage: test
  image: node:24
  script:
    - cd web
    - npm ci
    - npm run lint
    - npm run test:ci
    - npm audit --audit-level=high
    - npm run build
  rules:
    - exists:
        - web/angular.json
        - web/package-lock.json

mobile-test:
  stage: test
  image: ghcr.io/cirruslabs/flutter:3.44.0
  script:
    - cd mobile
    - flutter pub get
    - flutter analyze
    - flutter test
  # Gate sur le manifeste du projet, pas sur des artefacts générés : la règle
  # précédente exigeait mobile/pubspec.lock et mobile/android/app/build.gradle,
  # tous deux absents, si bien que le job ne s'est jamais exécuté et que le
  # pipeline restait vert sans jamais tester le mobile. Flutter 3.44 génère par
  # ailleurs build.gradle.kts, que l'ancienne règle n'aurait jamais reconnu.
  rules:
    - exists:
        - mobile/pubspec.yaml

security-scan:
  stage: security
  image: aquasec/trivy:0.64.1
  script:
    - trivy fs --exit-code 1 --severity CRITICAL,HIGH .

package-placeholder:
  stage: package
  image: alpine:3.22
  script:
    - echo "Packaging OCI images and SBOM is activated after R0 bootstrap."

production:
  stage: deploy
  image: alpine:3.22
  when: manual
  allow_failure: false
  script:
    - echo "Production deployment requires an approved change record and human authorization."
