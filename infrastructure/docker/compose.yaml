services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Port hôte configurable : 5432 est fréquemment déjà occupé par une installation
      # PostgreSQL locale, qui masque alors ce conteneur — le client se connecte au
      # mauvais serveur et échoue sur une erreur d'authentification trompeuse. Le port
      # dans le conteneur reste standard.
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      # Les images PostgreSQL 18+ rangent les données dans un sous-répertoire nommé
      # par version majeure et attendent le montage sur /var/lib/postgresql. Monter
      # sur /var/lib/postgresql/data faisait échouer le démarrage : le conteneur
      # sortait en erreur, alors que `docker compose config` restait vert — cette
      # commande ne valide que la syntaxe, jamais le démarrage réel.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.2-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"

  valkey:
    image: valkey/valkey:9.1.0-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8081:8080"

volumes:
  pgdata:
