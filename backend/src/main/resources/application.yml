spring:
  application:
    name: cnpm-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cnpm}
    username: ${DATABASE_USER:cnpm_app}
    password: ${DATABASE_PASSWORD:change-me-local}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/cnpm}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
