spring:
  application:
    name: cnpm-platform
  # Base locale du projet (PGAdmin) : CNPM_DB / app_user sur le PostgreSQL 18 (5432).
  # Le nom et l'utilisateur ne sont pas des secrets ; le mot de passe reste fail-closed
  # (ci-dessous, sans repli). Ces valeurs restent surchargeables par l'environnement.
  datasource:
    # URL composable depuis des variables separees (DATABASE_HOST/PORT/NAME) : un
    # hebergeur managé (ex. Render) expose l'hote, le port et la base separement, sans
    # possibilite de les concatener dans son blueprint. DATABASE_URL, si fournie, prime
    # et court-circuite la composition. Le defaut local reste identique a l'existant.
    url: ${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:CNPM_DB}}
    username: ${DATABASE_USER:app_user}
    # Aucune valeur de repli : le démarrage doit échouer si le mot de passe n'est
    # pas fourni par l'environnement, plutôt que de démarrer en silence avec un
    # identifiant faible et versionné (fail-open). Le développement local
    # positionne DATABASE_PASSWORD via .env ; les tests le fixent par Testcontainers.
    password: ${DATABASE_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    # Reprend les variables qui pilotent déjà le conteneur : sans configuration,
    # l'application tentait `guest/guest` et la sonde de santé restait DOWN.
    # Aucun repli sur les identifiants, pour la même raison que la base.
    username: ${RABBITMQ_DEFAULT_USER}
    password: ${RABBITMQ_DEFAULT_PASS}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/cnpm}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
