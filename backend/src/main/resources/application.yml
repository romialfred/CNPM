spring:
  application:
    name: cnpm-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cnpm}
    username: ${DATABASE_USER:cnpm_app}
    # Aucune valeur de repli : le démarrage doit échouer si le mot de passe n'est
    # pas fourni par l'environnement, plutôt que de démarrer en silence avec un
    # identifiant faible et versionné (fail-open). Le développement local
    # positionne DATABASE_PASSWORD via .env ; les tests le fixent par Testcontainers.
    password: ${DATABASE_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/cnpm}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
