# Configuration réservée aux tests (classpath de test).
#
# Clé de chiffrement MFA FACTICE, uniquement pour permettre le démarrage du contexte de
# test : ce n'est PAS un secret et elle ne protège aucune donnée réelle. En production,
# MFA_ENCRYPTION_KEY est fournie par l'environnement (fail-closed si absente hors dev/test).
MFA_ENCRYPTION_KEY=test-mfa-key-not-a-secret-0123456789

# Secret de signature du jeton applicatif natif — FACTICE, réservé aux tests.
APP_JWT_SECRET=test-app-jwt-secret-not-a-secret-0123456789
