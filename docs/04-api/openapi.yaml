      x-requirements:
      - MEM-001
      - MEM-002
      - MEM-003
      - MEM-004
      - MEM-005
      - MEM-006
      - MEM-007
      - MEM-008
  /organizations/{id}:
    get:
      tags:
      - MEMBER
      summary: Consulter la fiche 360°.
      operationId: getOrganization
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
