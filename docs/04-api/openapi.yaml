components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://iam.example.cnpm.ml/realms/cnpm/protocol/openid-connect/auth
          tokenUrl: https://iam.example.cnpm.ml/realms/cnpm/protocol/openid-connect/token
          scopes:
            openid: Identité
            profile: Profil
            offline_access: Renouvellement contrôlé
  parameters:
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 100
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    Uuid:
      type: string
      format: uuid
    Money:
      type: object
      required:
      - amount
      - currency
      properties:
        amount:
          type: string
          pattern: ^-?\d{1,17}(\.\d{1,2})?$
          example: '125000.00'
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          example: XOF
    AuditFields:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/Uuid'
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    Resource:
      type: object
      required:
      - id
      - status
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        businessReference:
          type: string
        status:
          type: string
        attributes:
          type: object
          additionalProperties: true
        audit:
          $ref: '#/components/schemas/AuditFields'
    ResourceInput:
      type: object
      properties:
        businessReference:
          type: string
        attributes:
          type: object
          additionalProperties: true
      additionalProperties: false
    DecisionInput:
      type: object
      required:
      - decision
      - reason
      properties:
        decision:
          type: string
          enum:
          - APPROVE
          - REJECT
          - CANCEL
          - CONFIRM
        reason:
          type: string
          minLength: 3
          maxLength: 1000
    PageResource:
      type: object
      required:
      - items
      - page
      - size
      - totalElements
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
