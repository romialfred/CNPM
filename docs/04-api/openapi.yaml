openapi: 3.1.0
info:
  title: CNPM Digital Platform API
  version: 1.0.0
  description: Contrat API de référence pour les portails Web, mobile, back-office et intégrations CNPM.
servers:
- url: https://api.example.cnpm.ml/v1
  description: URL de production à confirmer
- url: https://api.sandbox.example.cnpm.ml/v1
  description: Sandbox à confirmer
security:
- oauth2:
  - openid
tags:
- name: ADMIN
  description: Administration et paramétrage
- name: MEMBER
  description: Membres et entreprises
- name: ENROLLMENT
  description: Enrôlement et adhésion
- name: CONTRIBUTION
  description: Cotisations et échéanciers
- name: PAYMENT
  description: Paiements et rapprochement
- name: RECEIPT
  description: Reçus et attestations
- name: RECOVERY
  description: Recouvrement et relances
- name: PORTAL
  description: Portail et application membre
- name: REQUEST
  description: Requêtes et réclamations
- name: GROUP
  description: Groupements professionnels
- name: INCENTIVE
  description: Primes et partage de revenus
- name: DOCUMENT
  description: Gestion électronique des documents
- name: EVENT
  description: Événements et formations
- name: REPORT
  description: Décisionnel et reporting
- name: SECURITY
  description: Sécurité et identité
- name: AUDIT
  description: Audit et conformité
- name: INTEGRATION
  description: Intégrations et interopérabilité
- name: AUTH
  description: Identité et contexte utilisateur
paths:
  /auth/me:
    get:
      tags:
      - AUTH
      summary: Lire le profil, les rôles et le périmètre courant.
      operationId: getCurrentUser
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Ressource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
  /auth/step-up:
    post:
      tags:
      - AUTH
      summary: Déclencher une authentification renforcée.
      operationId: requestStepUp
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Opération effectuée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '201':
          description: Ressource créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceInput'
  /reference-values:
    get:
      tags:
      - ADMIN
      summary: Lister les valeurs de référentiel.
      operationId: listReferenceValues
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: domain
        in: query
        required: false
        description: Filtre optionnel sur un domaine de référentiel (ex. MEMBER_CATEGORY).
        schema:
          type: string
          maxLength: 80
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Collection paginée de valeurs de référentiel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceValuePage'
      x-requirements:
      - ADM-001
      - ADM-002
      - ADM-003
      - ADM-004
      - ADM-005
    post:
      tags:
      - ADMIN
      summary: Créer une valeur de référentiel.
      operationId: createReferenceValue
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Valeur déjà existante et identique (rejeu idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceValueView'
        '201':
          description: Valeur de référentiel créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceValueView'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceValueInput'
      x-requirements:
      - ADM-001
      - ADM-002
      - ADM-003
      - ADM-004
      - ADM-005
  /reference-values/{id}:
    patch:
      tags:
      - ADMIN
      summary: Mettre à jour une valeur de référentiel.
      operationId: updateReferenceValue
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: If-Match
        in: header
        required: true
        description: Version attendue (verrou optimiste). Un écart avec la version courante produit un 409.
        schema:
          type: integer
          format: int64
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Valeur de référentiel mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceValueView'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReferenceValueUpdate'
      x-requirements:
      - ADM-001
      - ADM-002
      - ADM-003
      - ADM-004
      - ADM-005
  /organizations:
    get:
      tags:
      - MEMBER
      summary: Rechercher les entreprises.
      operationId: listOrganizations
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - name: status
        in: query
        required: false
        description: Filtre sur le statut de l'entreprise (ACTIVE, DORMANT, PROSPECT…).
        schema:
          type: string
          maxLength: 30
      - name: organizationType
        in: query
        required: false
        description: Filtre sur le type d'entreprise.
        schema:
          type: string
          maxLength: 40
      - name: sectorCode
        in: query
        required: false
        description: Filtre sur le secteur d'activité (code de référentiel).
        schema:
          type: string
          maxLength: 80
      - name: search
        in: query
        required: false
        description: Recherche libre sur la raison sociale ou le nom commercial.
        schema:
          type: string
          maxLength: 120
      - name: sort
        in: query
        required: false
        description: 'Tri : legalName ou status, suffixé de ,asc ou ,desc.'
        schema:
          type: string
          maxLength: 40
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/Size'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '200':
          description: Collection paginée d'entreprises
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationPage'
      x-requirements:
      - MEM-001
      - MEM-002
      - MEM-003
      - MEM-004
      - MEM-005
      - MEM-006
      - MEM-007
      - MEM-008
    post:
      tags:
      - MEMBER
      summary: Créer une entreprise.
      operationId: createOrganization
      parameters:
      - $ref: '#/components/parameters/CorrelationId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '400':
